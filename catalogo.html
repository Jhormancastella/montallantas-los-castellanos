<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precios y Servicios - Montallantas Los Castellanos</title>
    <meta name="description" content="Consulta los precios de servicios e insumos de Montallantas Los Castellanos.">
    <meta name="theme-color" content="#FF6B35">
    <link rel="icon" type="image/png" href="assets/branding/favicon.png">
    <link rel="manifest" href="site.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #FF6B35;
            --primary-dark: #e55a25;
            --secondary: #2C3E50;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333;
            --text-muted: #6c757d;
            --border: #e9ecef;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: var(--secondary);
            color: white;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-brand img {
            height: 36px;
        }

        .header-brand span {
            font-size: 1rem;
            font-weight: 600;
            display: none;
        }

        @media (min-width: 480px) {
            .header-brand span { display: block; }
        }

        .btn-admin {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-admin:hover { background: var(--primary-dark); }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, var(--secondary) 0%, #3d5166 100%);
            color: white;
            text-align: center;
            padding: 48px 24px 40px;
        }

        .hero h1 {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 0.95rem;
            opacity: 0.8;
            max-width: 480px;
            margin: 0 auto;
        }

        /* SEARCH */
        .search-bar {
            max-width: 560px;
            margin: -24px auto 0;
            padding: 0 16px;
            position: relative;
            z-index: 10;
        }

        .search-input-wrap {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 10px;
        }

        .search-input-wrap i { color: var(--text-muted); }

        .search-input-wrap input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 0;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
        }

        .search-input-wrap input::placeholder { color: var(--text-muted); }

        /* MAIN */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 16px 60px;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: color 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-btn:hover:not(.active) { color: var(--text); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* SECTION TITLE */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .count-badge {
            background: var(--primary);
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* CARDS GRID */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .price-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .price-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: #fff3ee;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .card-icon img {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card-info { flex: 1; min-width: 0; }

        .card-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-category {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-price {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
        }

        /* EMPTY / LOADING */
        .state-box {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .state-box i { font-size: 2.5rem; margin-bottom: 12px; display: block; opacity: 0.4; }
        .state-box p { font-size: 0.95rem; }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }

        /* CATEGORY FILTER */
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .cat-chip {
            background: white;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.8rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-muted);
        }

        .cat-chip.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .cat-chip:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-brand">
            <img src="assets/branding/logo-header.png" alt="Montallantas Los Castellanos" onerror="this.src='assets/branding/favicon.png'">
            <span>Montallantas Los Castellanos</span>
        </div>
        <a href="index.html" class="btn-admin">
            <i class="fas fa-user-shield"></i> Acceso Admin
        </a>
    </header>

    <div class="hero">
        <h1><i class="fas fa-tags" style="color: var(--primary);"></i> Precios y Servicios</h1>
        <p>Consulta nuestros precios de montajes y productos disponibles</p>
    </div>

    <div class="search-bar">
        <div class="search-input-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar servicio o producto..." oninput="applyFilters()">
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('servicios', this)">
                <i class="fas fa-wrench"></i> Servicios
            </button>
            <button class="tab-btn" onclick="switchTab('insumos', this)">
                <i class="fas fa-box"></i> Productos
            </button>
        </div>

        <!-- SERVICIOS -->
        <div id="tab-servicios" class="tab-panel active">
            <div class="section-title">
                <i class="fas fa-tools"></i> Montajes y servicios
                <span class="count-badge" id="countServicios">0</span>
            </div>
            <div class="cards-grid" id="serviciosGrid">
                <div class="state-box" style="grid-column:1/-1">
                    <div class="spinner"></div>
                    <p>Cargando servicios...</p>
                </div>
            </div>
        </div>

        <!-- INSUMOS -->
        <div id="tab-insumos" class="tab-panel">
            <div class="category-filters" id="categoryFilters"></div>
            <div class="section-title">
                <i class="fas fa-box-open"></i> Productos disponibles
                <span class="count-badge" id="countInsumos">0</span>
            </div>
            <div class="cards-grid" id="insumosGrid">
                <div class="state-box" style="grid-column:1/-1">
                    <div class="spinner"></div>
                    <p>Cargando productos...</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        &copy; <span id="year"></span> Montallantas Los Castellanos
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const cfg = window.APP_CONFIG;
        const supabase = window.supabase.createClient(cfg.supabase.url, cfg.supabase.anonKey);

        let allServicios = [];
        let allInsumos = [];
        let activeCategory = 'all';
        let activeTab = 'servicios';

        function formatCOP(value) {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(value);
        }

        function esc(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        async function loadData() {
            const [{ data: servicios, error: e1 }, { data: insumos, error: e2 }] = await Promise.all([
                supabase.from('servicios').select('nombre, precio').order('nombre'),
                supabase.from('insumos').select('nombre, categoria, precio, imagen_url').order('categoria').order('nombre')
            ]);

            if (e1) { showError('serviciosGrid', 'No se pudieron cargar los servicios'); }
            else { allServicios = servicios || []; renderServicios(allServicios); }

            if (e2) { showError('insumosGrid', 'No se pudieron cargar los productos'); }
            else { allInsumos = insumos || []; buildCategoryFilters(); renderInsumos(allInsumos); }
        }

        function renderServicios(list) {
            const grid = document.getElementById('serviciosGrid');
            document.getElementById('countServicios').textContent = list.length;

            if (!list.length) {
                grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><i class="fas fa-tools"></i><p>No hay servicios disponibles</p></div>`;
                return;
            }

            grid.innerHTML = list.map(s => `
                <div class="price-card">
                    <div class="card-icon"><i class="fas fa-wrench"></i></div>
                    <div class="card-info">
                        <div class="card-name">${esc(s.nombre)}</div>
                    </div>
                    <div class="card-price">${formatCOP(s.precio)}</div>
                </div>
            `).join('');
        }

        function renderInsumos(list) {
            const grid = document.getElementById('insumosGrid');
            document.getElementById('countInsumos').textContent = list.length;

            if (!list.length) {
                grid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><i class="fas fa-box"></i><p>No se encontraron productos</p></div>`;
                return;
            }

            grid.innerHTML = list.map(ins => `
                <div class="price-card">
                    <div class="card-icon">
                        ${ins.imagen_url
                            ? `<img src="${esc(ins.imagen_url)}" alt="${esc(ins.nombre)}" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-box\\'></i>'">`
                            : '<i class="fas fa-box"></i>'
                        }
                    </div>
                    <div class="card-info">
                        <div class="card-name">${esc(ins.nombre)}</div>
                        <div class="card-category">${esc(ins.categoria)}</div>
                    </div>
                    <div class="card-price">${formatCOP(ins.precio)}</div>
                </div>
            `).join('');
        }

        function buildCategoryFilters() {
            const cats = ['all', ...new Set(allInsumos.map(i => i.categoria).filter(Boolean).sort())];
            const container = document.getElementById('categoryFilters');
            container.innerHTML = cats.map(c => `
                <button class="cat-chip ${c === 'all' ? 'active' : ''}" onclick="filterByCategory('${esc(c)}', this)">
                    ${c === 'all' ? 'Todos' : esc(c)}
                </button>
            `).join('');
        }

        function filterByCategory(cat, el) {
            activeCategory = cat;
            document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();

            if (activeTab === 'servicios') {
                const filtered = allServicios.filter(s => !q || s.nombre.toLowerCase().includes(q));
                renderServicios(filtered);
            } else {
                let filtered = allInsumos;
                if (activeCategory !== 'all') filtered = filtered.filter(i => i.categoria === activeCategory);
                if (q) filtered = filtered.filter(i => i.nombre.toLowerCase().includes(q) || (i.categoria || '').toLowerCase().includes(q));
                renderInsumos(filtered);
            }
        }

        function switchTab(tab, btn) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            applyFilters();
        }

        function showError(gridId, msg) {
            document.getElementById(gridId).innerHTML = `
                <div class="state-box" style="grid-column:1/-1">
                    <i class="fas fa-exclamation-circle"></i><p>${msg}</p>
                </div>`;
        }

        loadData();
    </script>
</body>
</html>
